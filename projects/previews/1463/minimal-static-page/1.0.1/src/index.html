<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venice Key Demo Panel</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #141b34;
      --text: #eaf0ff;
      --muted: #9fb0d9;
      --accent: #6ea8fe;
      --ok: #21c27a;
      --border: #2a365f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #18254e 0%, var(--bg) 50%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { margin: 0 0 10px; font-size: 30px; }
    .sub { color: var(--muted); margin-bottom: 18px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card {
      background: rgba(20, 27, 52, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    .card h3 { margin: 0 0 10px; font-size: 17px; }
    label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    input, select, textarea {
      width: 100%; background: #0f1630; color: var(--text);
      border: 1px solid #2d3d71; border-radius: 10px; padding: 10px;
      margin-bottom: 10px;
    }
    textarea { min-height: 100px; resize: vertical; }
    .row { display: flex; gap: 8px; align-items: center; }
    button {
      background: var(--accent); color: #0a1226; border: none; border-radius: 10px;
      padding: 10px 14px; font-weight: 700; cursor: pointer;
    }
    button.secondary { background: #2a3867; color: #d7e2ff; }
    .tip {
      margin-top: 10px; font-size: 12px; color: var(--muted);
      border-left: 3px solid #3d4f83; padding-left: 8px;
    }
    .status { margin-top: 10px; font-size: 13px; color: var(--ok); }
    pre {
      background: #0a1127; border: 1px solid #243260; border-radius: 10px;
      padding: 12px; overflow: auto; max-height: 380px; font-size: 12px;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Venice 操作面板（用户 Key 版）</h1>
    <div class="sub">已实现 3 个简单操作：查余额、列模型、快速对话。Key 只保存在浏览器，不会写入页面代码。</div>

    <div class="card" style="margin-bottom:16px;">
      <h3>🔐 Venice API Key</h3>
      <label for="apiKey">输入你的 Venice Key（可选，留空则使用服务端已配置 key）</label>
      <div class="row">
        <input id="apiKey" type="password" placeholder="VENICE_INFERENCE_KEY_..." />
        <button id="saveKey" class="secondary" style="min-width:120px;">保存到本地</button>
        <button id="clearKey" class="secondary" style="min-width:120px;">清除</button>
      </div>
      <div class="tip">只存在当前浏览器 localStorage，点击清除可立即移除。</div>
      <div id="keyStatus" class="status"></div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>1) 查询账户余额</h3>
        <button id="btnBalance">查询余额</button>
      </div>

      <div class="card">
        <h3>2) 列出模型</h3>
        <label for="modelType">模型类型</label>
        <select id="modelType">
          <option value="text">text</option>
          <option value="image">image</option>
          <option value="video">video</option>
          <option value="tts">tts</option>
          <option value="stt">stt</option>
          <option value="embedding">embedding</option>
        </select>
        <button id="btnModels">获取模型列表</button>
      </div>

      <div class="card" style="grid-column: 1 / -1;">
        <h3>3) 快速对话</h3>
        <label for="chatModel">模型 ID</label>
        <input id="chatModel" value="zai-org-glm-5-1" />
        <label for="prompt">Prompt</label>
        <textarea id="prompt">用一句话介绍 Venice API。</textarea>
        <button id="btnChat">发送</button>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>返回结果</h3>
      <pre id="out">等待操作...</pre>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const out = $('out');
    const keyStatus = $('keyStatus');

    function getKey() {
      return localStorage.getItem('venice_api_key') || '';
    }

    function setKeyStatus(msg) {
      keyStatus.textContent = msg;
    }

    function show(data) {
      out.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    async function callApi(url, options = {}) {
      const key = getKey();
      const headers = Object.assign({'Content-Type': 'application/json'}, options.headers || {});
      if (key) headers['X-Venice-Key'] = key;
      const resp = await fetch(url, {...options, headers});
      const json = await resp.json().catch(() => ({ok:false, error:'响应不是 JSON'}));
      if (!resp.ok) throw json;
      return json;
    }

    $('saveKey').onclick = () => {
      const v = $('apiKey').value.trim();
      if (!v) return setKeyStatus('请输入 key 后再保存');
      localStorage.setItem('venice_api_key', v);
      $('apiKey').value = '';
      setKeyStatus('✅ Key 已保存到浏览器本地');
    };

    $('clearKey').onclick = () => {
      localStorage.removeItem('venice_api_key');
      $('apiKey').value = '';
      setKeyStatus('🧹 已清除本地 Key');
    };

    $('btnBalance').onclick = async () => {
      show('请求中...');
      try {
        const data = await callApi('/api/balance', {method: 'POST', body: JSON.stringify({})});
        show(data);
      } catch (e) {
        show(e);
      }
    };

    $('btnModels').onclick = async () => {
      show('请求中...');
      try {
        const type = $('modelType').value;
        const data = await callApi(`/api/models?type=${encodeURIComponent(type)}`);
        show(data);
      } catch (e) {
        show(e);
      }
    };

    $('btnChat').onclick = async () => {
      show('请求中...');
      try {
        const model = $('chatModel').value.trim();
        const prompt = $('prompt').value.trim();
        const data = await callApi('/api/chat', {
          method: 'POST',
          body: JSON.stringify({model, prompt})
        });
        show(data);
      } catch (e) {
        show(e);
      }
    };

    if (getKey()) setKeyStatus('已检测到本地已保存的 Venice Key');
    else setKeyStatus('当前未保存本地 Key（可直接用服务端已配置 key）');
  </script>
</body>
</html>
