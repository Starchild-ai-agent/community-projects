<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Run Lab — Post-Run Coach</title>
  <style>
    :root {
      --bg: #090b10;
      --panel: #121723;
      --muted: #9aa4b5;
      --text: #eef2f7;
      --accent: #5eead4;
      --accent2: #60a5fa;
      --bad: #fb7185;
      --ok: #34d399;
      --warn: #f59e0b;
      --line: #223047;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(circle at 20% 0%, #152238 0%, var(--bg) 40%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }
    .card {
      background: linear-gradient(180deg, #121a2a 0%, #0e1421 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .muted { color: var(--muted); }
    .grid { display: grid; gap: 10px; }
    label { font-size: 13px; color: #d7deea; }
    input, select, button, textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #26354e;
      background: #0a1220;
      color: var(--text);
      padding: 10px 11px;
      font-size: 14px;
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid #2a4f85;
      border-color: transparent;
    }
    button {
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #07101a;
      border: none;
      font-weight: 700;
      margin-top: 6px;
    }
    button.secondary {
      background: #121b2b;
      color: #dce4f1;
      border: 1px solid #30415f;
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat {
      background: #0a1220;
      border: 1px solid #24314a;
      border-radius: 10px;
      padding: 12px;
    }
    .stat .k { color: var(--muted); font-size: 12px; }
    .stat .v { font-size: 21px; font-weight: 800; margin-top: 4px; }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      margin-right: 6px;
      margin-bottom: 6px;
      border: 1px solid #2a3a58;
      background: #0d1729;
    }
    .ok { color: var(--ok); border-color: #1d5c4f; }
    .warn { color: var(--warn); border-color: #78511a; }
    .bad { color: var(--bad); border-color: #7e2f45; }
    ul { margin: 8px 0 0; padding-left: 18px; }
    li { margin: 6px 0; color: #dbe2ef; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    textarea { min-height: 140px; resize: vertical; }
    @media (max-width: 920px) {
      .wrap { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>🏃 Run Lab</h1>
      <div class="muted" style="margin-bottom: 14px;">Drop your run stats, get pace zones + recovery plan in 1 click.</div>
      <div class="grid">
        <div class="row2">
          <div>
            <label>Distance (km)</label>
            <input id="distance" type="number" min="0.5" step="0.1" value="8" />
          </div>
          <div>
            <label>Duration (min)</label>
            <input id="duration" type="number" min="5" step="0.1" value="45" />
          </div>
        </div>
        <div class="row2">
          <div>
            <label>Average heart rate (bpm, optional)</label>
            <input id="hr" type="number" min="60" max="220" step="1" placeholder="e.g. 154" />
          </div>
          <div>
            <label>RPE (1-10 effort)</label>
            <select id="rpe">
              <option value="3">3 - very easy</option>
              <option value="4">4 - easy</option>
              <option value="5" selected>5 - steady</option>
              <option value="6">6 - comfortably hard</option>
              <option value="7">7 - hard</option>
              <option value="8">8 - very hard</option>
              <option value="9">9 - near max</option>
            </select>
          </div>
        </div>
        <div class="row2">
          <div>
            <label>Weather</label>
            <select id="weather">
              <option value="cool">Cool (&lt;15°C)</option>
              <option value="mild" selected>Mild (15-24°C)</option>
              <option value="hot">Hot (25-32°C)</option>
              <option value="veryhot">Very hot (&gt;32°C)</option>
            </select>
          </div>
          <div>
            <label>Body weight (kg)</label>
            <input id="weight" type="number" min="35" max="200" step="0.5" value="72" />
          </div>
        </div>
        <button id="analyze">Analyze Run</button>
      </div>
    </section>

    <section class="card">
      <div class="stats">
        <div class="stat">
          <div class="k">Pace</div>
          <div class="v" id="pace">--</div>
        </div>
        <div class="stat">
          <div class="k">Speed</div>
          <div class="v" id="speed">--</div>
        </div>
        <div class="stat">
          <div class="k">Estimated load</div>
          <div class="v" id="load">--</div>
        </div>
      </div>

      <div style="margin-bottom:10px;" id="effortPills"></div>

      <div class="split">
        <div>
          <h3 style="margin:6px 0 8px;">Next 24h recovery</h3>
          <ul id="recoveryList"></ul>
        </div>
        <div>
          <h3 style="margin:6px 0 8px;">Next workout suggestion</h3>
          <ul id="nextRunList"></ul>
        </div>
      </div>

      <h3 style="margin:14px 0 8px;">Training pace guidance</h3>
      <div id="zones" class="muted"></div>

      <h3 style="margin:14px 0 8px;">Debrief (copy/paste)</h3>
      <textarea id="debrief" readonly></textarea>
      <div class="row2" style="margin-top:8px;">
        <button class="secondary" id="copyBtn">Copy Debrief</button>
        <button class="secondary" id="sampleBtn">Load sample hard run</button>
      </div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function mmss(minPerKm) {
      const m = Math.floor(minPerKm);
      const s = Math.round((minPerKm - m) * 60);
      const ss = s === 60 ? 0 : s;
      const mm = s === 60 ? m + 1 : m;
      return `${mm}:${String(ss).padStart(2, '0')}/km`;
    }

    function effortLabel(rpe, hr) {
      let score = rpe;
      if (hr) {
        if (hr >= 175) score += 2;
        else if (hr >= 160) score += 1;
        else if (hr <= 135) score -= 1;
      }
      if (score <= 4) return { tag: 'Easy day', level: 'ok' };
      if (score <= 6) return { tag: 'Steady aerobic', level: 'ok' };
      if (score <= 7) return { tag: 'Threshold stress', level: 'warn' };
      return { tag: 'High neuromuscular strain', level: 'bad' };
    }

    function weatherHydration(weather) {
      if (weather === 'cool') return 0.45;
      if (weather === 'mild') return 0.60;
      if (weather === 'hot') return 0.85;
      return 1.10;
    }

    function recommendation(load, effortType) {
      if (load > 420 || effortType.level === 'bad') {
        return {
          recovery: [
            'Within 30 min: 25-35g protein + 1.0g/kg carbs',
            'Sleep target: 8-9h tonight',
            'Mobility: 12 min easy hips + calves',
            'Tomorrow: either full rest or 20-30 min very easy jog'
          ],
          next: [
            '48h later: easy aerobic run 35-50 min',
            'No intervals until legs feel springy again',
            'If soreness >6/10 tomorrow morning, postpone quality session 24h'
          ]
        };
      }
      if (load > 250 || effortType.level === 'warn') {
        return {
          recovery: [
            'Within 45 min: 20-30g protein + 0.8g/kg carbs',
            'Hydrate steadily until urine is light yellow',
            'Light walk or spin 15-20 min later today'
          ],
          next: [
            'Tomorrow: easy run 30-45 min in Zone 2',
            'Quality session can resume in 24-36h if HR and legs feel normal'
          ]
        };
      }
      return {
        recovery: [
          'Refuel normally: 20g protein + mixed carbs',
          '5-8 min mobility to keep range of motion',
          'Normal bedtime, no extra intervention needed'
        ],
        next: [
          'Tomorrow: choose easy run 30-40 min or strides session',
          'If fresh, short tempo block is acceptable in 24h'
        ]
      };
    }

    function analyze() {
      const distance = parseFloat($('distance').value);
      const duration = parseFloat($('duration').value);
      const hr = parseFloat($('hr').value) || null;
      const rpe = parseInt($('rpe').value, 10);
      const weather = $('weather').value;
      const weight = parseFloat($('weight').value);

      if (!distance || !duration || distance <= 0 || duration <= 0) {
        alert('Please enter valid distance and duration.');
        return;
      }

      const pace = duration / distance;
      const speed = distance / (duration / 60);
      const load = Math.round(duration * (rpe * 0.9 + (hr ? Math.max(0, (hr - 120) / 40) : 0.8)));
      const effortType = effortLabel(rpe, hr);
      const waterPerHour = weatherHydration(weather);
      const liters = Math.round(((duration / 60) * waterPerHour) * 10) / 10;
      const carbGrams = Math.round(weight * (effortType.level === 'bad' ? 1.0 : effortType.level === 'warn' ? 0.8 : 0.6));
      const proteinGrams = Math.round(weight * 0.35);

      $('pace').textContent = mmss(pace);
      $('speed').textContent = `${speed.toFixed(1)} km/h`;
      $('load').textContent = String(load);

      $('effortPills').innerHTML = `
        <span class="pill ${effortType.level}">${effortType.tag}</span>
        <span class="pill">Hydration target: ${liters}L over next 2-4h</span>
        <span class="pill">Refuel: ${carbGrams}g carbs + ${proteinGrams}g protein</span>
      `;

      const easyLow = pace + 0.55;
      const easyHigh = pace + 1.25;
      const tempoLow = Math.max(3.2, pace - 0.25);
      const tempoHigh = Math.max(3.3, pace + 0.15);
      const intervalLow = Math.max(2.9, pace - 0.75);
      const intervalHigh = Math.max(3.0, pace - 0.35);

      $('zones').innerHTML = `
        <div class="pill">Easy: ${mmss(easyLow)} – ${mmss(easyHigh)}</div>
        <div class="pill">Steady/Marathon-ish: ${mmss(pace + 0.2)} – ${mmss(pace + 0.45)}</div>
        <div class="pill">Tempo: ${mmss(tempoLow)} – ${mmss(tempoHigh)}</div>
        <div class="pill">Intervals: ${mmss(intervalLow)} – ${mmss(intervalHigh)}</div>
      `;

      const rec = recommendation(load, effortType);
      $('recoveryList').innerHTML = rec.recovery.map(x => `<li>${x}</li>`).join('');
      $('nextRunList').innerHTML = rec.next.map(x => `<li>${x}</li>`).join('');

      const debrief = [
        `Run Debrief`,
        `- Distance: ${distance.toFixed(2)} km`,
        `- Time: ${duration.toFixed(1)} min`,
        `- Pace: ${mmss(pace)} (${speed.toFixed(1)} km/h)`,
        hr ? `- Avg HR: ${Math.round(hr)} bpm` : `- Avg HR: not logged`,
        `- RPE: ${rpe}/10`,
        `- Effort profile: ${effortType.tag}`,
        `- Load score: ${load}`,
        `- Recovery: ${liters}L hydration, ${carbGrams}g carbs, ${proteinGrams}g protein`,
        `- Next workout: ${rec.next[0]}`
      ].join('\n');
      $('debrief').value = debrief;
    }

    $('analyze').addEventListener('click', analyze);
    $('copyBtn').addEventListener('click', async () => {
      await navigator.clipboard.writeText($('debrief').value || '');
      $('copyBtn').textContent = 'Copied';
      setTimeout(() => $('copyBtn').textContent = 'Copy Debrief', 1200);
    });
    $('sampleBtn').addEventListener('click', () => {
      $('distance').value = 12;
      $('duration').value = 61;
      $('hr').value = 168;
      $('rpe').value = 8;
      $('weather').value = 'hot';
      $('weight').value = 72;
      analyze();
    });

    analyze();
  </script>
</body>
</html>
