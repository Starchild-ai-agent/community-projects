<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Starchild</title>
  <style>
    :root {
      --bg-1: #070b1a;
      --bg-2: #101b3a;
      --line: rgba(255, 255, 255, .14);
      --text: #eaf1ff;
      --muted: #a9b7d9;
      --primary: #7c9cff;
      --accent: #4de2c5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background:
        radial-gradient(1100px 600px at 20% 10%, rgba(124, 156, 255, .22), transparent 55%),
        radial-gradient(900px 500px at 82% 88%, rgba(77, 226, 197, .16), transparent 55%),
        linear-gradient(145deg, var(--bg-2), var(--bg-1) 58%);
      overflow: hidden;
    }

    .halo {
      position: fixed;
      inset: auto;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
      pointer-events: none;
    }
    .halo.one { top: -120px; left: -80px; background: rgba(124, 156, 255, .18); }
    .halo.two { right: -90px; bottom: -140px; background: rgba(77, 226, 197, .14); }

    .card {
      position: relative;
      z-index: 1;
      width: min(760px, 92vw);
      padding: clamp(26px, 4vw, 42px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(150deg, rgba(255, 255, 255, .13), rgba(255, 255, 255, .04));
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .42);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      color: #d6e2ff;
      background: rgba(124, 156, 255, .16);
      border: 1px solid rgba(124, 156, 255, .38);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 6vw, 62px);
      line-height: 1.05;
      letter-spacing: .01em;
      text-wrap: balance;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.7;
      max-width: 58ch;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .btn:hover { transform: translateY(-1px); }

    .btn.primary {
      color: #051024;
      background: linear-gradient(120deg, #9cb5ff, #78ffd8);
      box-shadow: 0 10px 26px rgba(124, 156, 255, .35);
    }

    .btn.ghost {
      color: #dce7ff;
      background: rgba(255, 255, 255, .06);
      border-color: rgba(255, 255, 255, .2);
    }

    .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .item {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .05);
    }

    .item .label {
      font-size: 12px;
      color: #9bb0df;
      margin-bottom: 6px;
    }

    .item .value {
      font-size: 14px;
      color: #eef4ff;
      font-weight: 600;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="halo one"></div>
  <div class="halo two"></div>

  <main class="card">
    <span class="badge">✨ Starchild Showcase</span>
    <h1>Hello, Starchild</h1>
    <p>现在这个页面升级成了更完整的视觉版本：柔和光晕背景、玻璃质感卡片和更清晰的信息层次，适合继续扩展成产品落地页或项目封面页。</p>

    <div class="actions">
      <a class="btn primary" href="/preview/hello-starchild/">打开预览</a>
      <a class="btn ghost" href="https://community.iamstarchild.com/1463-hello-starchild" target="_blank" rel="noopener noreferrer">访问公网页面</a>
    </div>

    <section class="grid" aria-label="页面亮点">
      <article class="item">
        <div class="label">视觉风格</div>
        <div class="value">Aurora + Glassmorphism</div>
      </article>
      <article class="item">
        <div class="label">布局</div>
        <div class="value">响应式单卡设计</div>
      </article>
      <article class="item">
        <div class="label">可扩展</div>
        <div class="value">可直接加功能模块</div>
      </article>
    </section>
  </main>
</body>
</html>
