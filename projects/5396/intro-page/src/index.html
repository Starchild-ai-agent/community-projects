<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello, I'm Here</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #111111;
      --muted: #666666;
      --accent: #2563eb;
      --accent-2: #7c3aed;
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.08);
      --radius: 24px;
      --transition: 0.2s ease;
    }

    [data-theme="dark"] {
      --bg: #0a0a0a;
      --surface: #141414;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --accent: #60a5fa;
      --accent-2: #a78bfa;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      opacity: 0.06;
      pointer-events: none;
    }

    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background var(--transition), transform 0.15s ease;
    }

    .theme-toggle:hover {
      background: var(--border);
    }

    .theme-toggle:active {
      transform: scale(0.92);
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
      font-size: 36px;
      font-weight: 700;
      color: white;
      margin-bottom: 28px;
      position: relative;
      animation: popIn 0.6s ease-out;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .role {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 24px;
    }

    .bio {
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 0.98rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
    }

    .link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background var(--transition), transform 0.15s ease, border-color 0.2s ease;
    }

    .link:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .link:active {
      transform: scale(0.96);
    }

    .link.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border: none;
    }

    .link.primary:hover {
      opacity: 0.92;
    }

    .footer {
      font-size: 0.85rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }

    @media (max-width: 520px) {
      .card {
        padding: 32px 24px;
      }
      h1 {
        font-size: 1.65rem;
      }
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>

    <div class="avatar" aria-hidden="true">A</div>
    <h1>Hello, I'm Here</h1>
    <p class="role">Builder · Thinker · Human</p>
    <p class="bio">This is my corner of the internet. I like making useful things, exploring ideas, and keeping it simple. Reach out if something resonates.</p>

    <nav class="links" aria-label="Social and contact links">
      <a class="link primary" href="mailto:hello@example.com" aria-label="Send email">Say Hello</a>
      <a class="link" href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">GitHub</a>
      <a class="link" href="https://x.com" target="_blank" rel="noopener noreferrer" aria-label="X profile">X</a>
    </nav>

    <footer class="footer">
      Built with care. Light and dark modes included.
    </footer>
  </main>

  <script>
    const toggle = document.getElementById('themeToggle');
    const root = document.documentElement;

    function getTheme() {
      return localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }

    applyTheme(getTheme());

    toggle.addEventListener('click', () => {
      const current = root.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });
  </script>
</body>
</html>
