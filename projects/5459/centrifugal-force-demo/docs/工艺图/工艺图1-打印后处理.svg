<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="SimSun, serif">
<rect width="900" height="420" fill="#fafafa"/>
<text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold">工艺图1  3D打印件后处理：旋转臂扩孔 + 滑块攻丝</text>

<!-- 左：旋转臂扩孔 -->
<text x="225" y="60" text-anchor="middle" font-size="13" fill="#2874a6" font-weight="bold">（a）旋转臂中心孔扩孔</text>
<rect x="80" y="120" width="290" height="24" fill="#d9a44a" stroke="#333" stroke-width="1.5"/>
<circle cx="225" cy="132" r="7" fill="#fff" stroke="#333" stroke-width="1.2"/>
<text x="225" y="136" text-anchor="middle" font-size="8">Φ16</text>
<rect x="215" y="180" width="20" height="80" fill="#aaa" stroke="#333" stroke-width="1"/>
<polygon points="215,260 235,260 225,280" fill="#aaa" stroke="#333" stroke-width="1"/>
<text x="225" y="300" text-anchor="middle" font-size="10">Φ16钻头</text>
<line x1="225" y1="175" x2="225" y2="155" stroke="#c0392b" stroke-width="2" marker-end="url(#a1)"/>
<text x="245" y="170" font-size="10" fill="#c0392b">垂直扩孔</text>
<text x="225" y="110" text-anchor="middle" font-size="9" fill="#666">打印孔偏小0.1-0.3mm，扩至Φ16</text>
<line x1="80" y1="160" x2="370" y2="160" stroke="#333" stroke-width="0.6"/>
<line x1="80" y1="155" x2="80" y2="165" stroke="#333"/>
<line x1="370" y1="155" x2="370" y2="165" stroke="#333"/>
<text x="225" y="175" text-anchor="middle" font-size="9">290</text>

<!-- 右：滑块攻丝 -->
<text x="675" y="60" text-anchor="middle" font-size="13" fill="#2874a6" font-weight="bold">（b）滑块M3孔攻丝</text>
<rect x="580" y="110" width="80" height="60" fill="#e8554e" stroke="#333" stroke-width="1.5"/>
<circle cx="620" cy="140" r="3" fill="#fff" stroke="#333"/>
<text x="620" y="143" text-anchor="middle" font-size="6">M3</text>
<rect x="615" y="190" width="10" height="70" fill="#aaa" stroke="#333" stroke-width="1"/>
<polygon points="615,260 625,260 620,275" fill="#aaa" stroke="#333" stroke-width="1"/>
<text x="620" y="295" text-anchor="middle" font-size="10">M3丝锥</text>
<line x1="620" y1="185" x2="620" y2="170" stroke="#c0392b" stroke-width="2" marker-end="url(#a1)"/>
<text x="640" y="180" font-size="10" fill="#c0392b">垂直攻丝</text>
<text x="620" y="100" text-anchor="middle" font-size="9" fill="#666">先用Φ2.5钻孔，再M3攻丝</text>
<line x1="580" y1="185" x2="660" y2="185" stroke="#333" stroke-width="0.6"/>
<line x1="580" y1="180" x2="580" y2="190" stroke="#333"/>
<line x1="660" y1="180" x2="660" y2="190" stroke="#333"/>
<text x="620" y="200" text-anchor="middle" font-size="9">40</text>

<!-- 底部说明 -->
<rect x="60" y="340" width="780" height="60" fill="none" stroke="#ccc"/>
<text x="80" y="360" font-size="11" font-weight="bold">操作要点：</text>
<text x="80" y="378" font-size="11">① 扩孔时钻头垂直于臂面，避免偏斜导致旋转偏心　② 攻丝前先钻Φ2.5底孔，丝锥垂直进入　③ 砂纸400目轻磨毛刺，勿过度打磨改变尺寸</text>
<defs><marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#c0392b"/></marker></defs>
</svg>
