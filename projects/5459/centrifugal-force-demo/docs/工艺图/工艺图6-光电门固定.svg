<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="SimSun, serif">
<rect width="900" height="520" fill="#fafafa"/>
<text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold">工艺图6  红外光电门固定位置</text>

<text x="450" y="55" text-anchor="middle" font-size="13" fill="#2874a6" font-weight="bold">（a）俯视图：光电门位置</text>

<!-- 旋转臂 -->
<rect x="200" y="200" width="400" height="12" fill="#d9a44a" stroke="#333" stroke-width="1.5"/>
<text x="400" y="195" text-anchor="middle" font-size="9">旋转臂</text>
<circle cx="400" cy="206" r="5" fill="#333"/>
<text x="400" y="225" text-anchor="middle" font-size="8">中心</text>

<!-- 滑块 -->
<rect x="540" y="190" width="30" height="40" fill="#e8554e" stroke="#333" stroke-width="1.5"/>
<text x="555" y="215" text-anchor="middle" font-size="8" fill="#fff">滑块</text>

<!-- 光电门 -->
<rect x="585" y="185" width="16" height="50" fill="#f0ad4e" stroke="#333" stroke-width="1.5"/>
<text x="593" y="250" text-anchor="middle" font-size="8">光电门</text>
<line x1="585" y1="200" x2="601" y2="200" stroke="#c0392b" stroke-width="0.8"/>
<line x1="585" y1="220" x2="601" y2="220" stroke="#c0392b" stroke-width="0.8"/>
<text x="620" y="215" font-size="8" fill="#c0392b">缺口</text>

<!-- 间距标注 -->
<line x1="570" y1="170" x2="585" y2="170" stroke="#c0392b" stroke-width="0.8"/>
<line x1="570" y1="165" x2="570" y2="175" stroke="#c0392b"/>
<line x1="585" y1="165" x2="585" y2="175" stroke="#c0392b"/>
<text x="577" y="162" text-anchor="middle" font-size="9" fill="#c0392b">5mm</text>

<!-- 滑块轨迹圆 -->
<circle cx="400" cy="206" r="155" fill="none" stroke="#e8554e" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
<text x="300" y="206" font-size="8" fill="#e8554e">滑块轨迹</text>

<!-- 夹具固定 -->
<rect x="585" y="240" width="16" height="20" fill="#aaa" stroke="#333" stroke-width="1"/>
<text x="593" y="275" text-anchor="middle" font-size="8">夹具</text>

<!-- 侧视图 -->
<text x="450" y="310" text-anchor="middle" font-size="13" fill="#2874a6" font-weight="bold">（b）侧视图：光电门与滑块高度对齐</text>
<rect x="300" y="380" width="300" height="12" fill="#d9a44a" stroke="#333" stroke-width="1.5"/>
<text x="450" y="375" text-anchor="middle" font-size="9">旋转臂（侧视）</text>
<rect x="520" y="370" width="30" height="32" fill="#e8554e" stroke="#333" stroke-width="1.5"/>
<text x="535" y="390" text-anchor="middle" font-size="8" fill="#fff">滑块</text>
<rect x="565" y="365" width="16" height="42" fill="#f0ad4e" stroke="#333" stroke-width="1.5"/>
<text x="573" y="420" text-anchor="middle" font-size="8">光电门</text>
<line x1="565" y1="380" x2="581" y2="380" stroke="#c0392b" stroke-width="0.8"/>
<line x1="565" y1="395" x2="581" y2="395" stroke="#c0392b" stroke-width="0.8"/>
<text x="620" y="395" font-size="9" fill="#c0392b">缺口对准滑块中部</text>
<text x="450" y="450" text-anchor="middle" font-size="9" fill="#666">光电门缺口高度需与滑块中部对齐，每圈只遮挡一次</text>
<text x="450" y="470" text-anchor="middle" font-size="9" fill="#c0392b">若每圈遮挡多次，ω会异常偏大，需调整光电门位置</text>
</svg>
