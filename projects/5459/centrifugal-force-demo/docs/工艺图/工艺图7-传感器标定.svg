<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="SimSun, serif">
<rect width="900" height="480" fill="#fafafa"/>
<text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold">工艺图7  传感器标定：挂砝码校准力读数</text>

<text x="450" y="55" text-anchor="middle" font-size="13" fill="#2874a6" font-weight="bold">标定步骤：归零 → 挂100g砝码 → 修正SCALE系数</text>

<!-- 步骤1：归零 -->
<text x="170" y="90" text-anchor="middle" font-size="12" fill="#2874a6" font-weight="bold">步骤1：归零（不挂重物）</text>
<rect x="120" y="110" width="100" height="20" fill="#d9a44a" stroke="#333" stroke-width="1.5"/>
<text x="170" y="125" text-anchor="middle" font-size="8" fill="#fff">旋转臂</text>
<rect x="145" y="130" width="20" height="30" fill="#5cb85c" stroke="#333" stroke-width="1.5"/>
<text x="155" y="148" text-anchor="middle" font-size="7" fill="#fff">S型</text>
<text x="170" y="180" text-anchor="middle" font-size="10">无受力</text>
<rect x="110" y="200" width="120" height="40" fill="#fff" stroke="#2874a6" stroke-width="1.5" rx="4"/>
<text x="170" y="220" text-anchor="middle" font-size="10" font-weight="bold">点「⚖️归零」</text>
<text x="170" y="235" text-anchor="middle" font-size="9">记录零点raw值</text>

<!-- 步骤2：挂砝码 -->
<text x="450" y="90" text-anchor="middle" font-size="12" fill="#2874a6" font-weight="bold">步骤2：挂100g砝码</text>
<rect x="400" y="110" width="100" height="20" fill="#d9a44a" stroke="#333" stroke-width="1.5"/>
<text x="450" y="125" text-anchor="middle" font-size="8" fill="#fff">旋转臂</text>
<rect x="425" y="130" width="20" height="30" fill="#5cb85c" stroke="#333" stroke-width="1.5"/>
<text x="435" y="148" text-anchor="middle" font-size="7" fill="#fff">S型</text>
<!-- 砝码 -->
<rect x="430" y="160" width="20" height="15" fill="#888" stroke="#333" stroke-width="1.2"/>
<text x="440" y="172" text-anchor="middle" font-size="7" fill="#fff">100g</text>
<line x1="435" y1="160" x2="435" y2="175" stroke="#333" stroke-width="0.8"/>
<text x="440" y="190" text-anchor="middle" font-size="9">0.981N</text>
<rect x="390" y="200" width="120" height="40" fill="#fff" stroke="#2874a6" stroke-width="1.5" rx="4"/>
<text x="450" y="220" text-anchor="middle" font-size="10" font-weight="bold">读取F_read</text>
<text x="450" y="235" text-anchor="middle" font-size="9">网页显示力值</text>

<!-- 步骤3：修正SCALE -->
<text x="730" y="90" text-anchor="middle" font-size="12" fill="#2874a6" font-weight="bold">步骤3：修正SCALE</text>
<rect x="670" y="200" width="120" height="40" fill="#fff" stroke="#2874a6" stroke-width="1.5" rx="4"/>
<text x="730" y="220" text-anchor="middle" font-size="10" font-weight="bold">发送SCALE:新值</text>
<text x="730" y="235" text-anchor="middle" font-size="9">新值=原值×(0.981/F_read)</text>
<text x="730" y="260" text-anchor="middle" font-size="9" fill="#c0392b">重复2-3次至误差&lt;2%</text>

<!-- 流程箭头 -->
<line x1="230" y1="220" x2="390" y2="220" stroke="#2874a6" stroke-width="2" marker-end="url(#a7)"/>
<line x1="510" y1="220" x2="670" y2="220" stroke="#2874a6" stroke-width="2" marker-end="url(#a7)"/>

<!-- 底部公式说明 -->
<rect x="60" y="300" width="780" height="150" fill="none" stroke="#ccc"/>
<text x="80" y="325" font-size="12" font-weight="bold">标定原理：</text>
<text x="80" y="350" font-size="11">力 F = (raw - zeroRaw) / SCALE</text>
<text x="80" y="375" font-size="11">挂100g砝码时理论力 = 0.1kg × 9.81m/s² = 0.981N</text>
<text x="80" y="400" font-size="11">若F_read ≠ 0.981，说明SCALE不准，按公式修正</text>
<text x="80" y="425" font-size="11" fill="#c0392b">修正后重复挂砝码验证，直到F_read误差&lt;2%即可用于实验</text>
<defs><marker id="a7" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2874a6"/></marker></defs>
</svg>
