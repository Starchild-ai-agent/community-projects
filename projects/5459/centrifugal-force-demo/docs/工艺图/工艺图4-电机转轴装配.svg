<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="SimSun, serif">
<rect width="900" height="480" fill="#fafafa"/>
<text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold">工艺图4  电机→联轴器→旋转臂  装配爆炸图</text>

<text x="450" y="55" text-anchor="middle" font-size="13" fill="#2874a6" font-weight="bold">爆炸视图（从左到右依次装配）</text>

<!-- 电机 -->
<rect x="60" y="200" width="120" height="80" fill="#4a90d9" stroke="#333" stroke-width="2" rx="4"/>
<text x="120" y="235" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">直流调速电机</text>
<text x="120" y="252" text-anchor="middle" font-size="9" fill="#fff">12V 0-300rpm</text>
<rect x="180" y="235" width="30" height="10" fill="#aaa" stroke="#333" stroke-width="1.5"/>
<text x="195" y="260" text-anchor="middle" font-size="8">电机轴Φ8</text>

<!-- 联轴器 -->
<rect x="230" y="225" width="40" height="30" fill="#aaa" stroke="#333" stroke-width="2" rx="3"/>
<circle cx="240" cy="240" r="2" fill="#c0392b"/>
<text x="250" y="270" text-anchor="middle" font-size="8">M3顶丝</text>
<text x="250" y="215" text-anchor="middle" font-size="9">联轴器Φ16内孔</text>

<!-- 旋转臂中心段 -->
<rect x="290" y="230" width="120" height="20" fill="#d9a44a" stroke="#333" stroke-width="1.5"/>
<circle cx="350" cy="240" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
<text x="350" y="244" text-anchor="middle" font-size="8">Φ16孔</text>
<text x="350" y="270" text-anchor="middle" font-size="9">旋转臂中心孔</text>

<!-- 装配方向箭头 -->
<line x1="215" y1="180" x2="280" y2="180" stroke="#c0392b" stroke-width="2" marker-end="url(#a4)"/>
<text x="248" y="172" text-anchor="middle" font-size="9" fill="#c0392b">插入</text>
<line x1="275" y1="180" x2="340" y2="180" stroke="#c0392b" stroke-width="2" marker-end="url(#a4)"/>
<text x="308" y="172" text-anchor="middle" font-size="9" fill="#c0392b">套入</text>

<!-- 装配后侧视图 -->
<text x="450" y="320" text-anchor="middle" font-size="13" fill="#2874a6" font-weight="bold">装配后侧视图</text>
<rect x="200" y="360" width="500" height="20" fill="#d9a44a" stroke="#333" stroke-width="1.5"/>
<text x="450" y="375" text-anchor="middle" font-size="10" fill="#fff">旋转臂（装配后）</text>
<rect x="420" y="340" width="60" height="20" fill="#aaa" stroke="#333" stroke-width="1.2"/>
<text x="450" y="355" text-anchor="middle" font-size="8">联轴器</text>
<rect x="430" y="300" width="40" height="40" fill="#4a90d9" stroke="#333" stroke-width="1.5"/>
<text x="450" y="325" text-anchor="middle" font-size="8" fill="#fff">电机</text>
<line x1="450" y1="390" x2="450" y2="420" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,2"/>
<text x="450" y="440" text-anchor="middle" font-size="9" fill="#c0392b">手动转动检查偏心，偏心明显则松顶丝重新对中</text>
<defs><marker id="a4" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#c0392b"/></marker></defs>
</svg>
