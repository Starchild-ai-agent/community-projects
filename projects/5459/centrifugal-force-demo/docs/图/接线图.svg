<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="SimSun, serif">
  <rect width="1000" height="720" fill="#fafafa"/>
  <text x="500" y="32" text-anchor="middle" font-size="20" font-weight="bold">方案A 传感器接线图</text>
  <text x="500" y="52" text-anchor="middle" font-size="12" fill="#666">ESP32 + HX711 + S型传感器 + 光电门</text>

  <!-- ESP32 -->
  <rect x="380" y="280" width="240" height="200" fill="#4a90d9" stroke="#333" stroke-width="2" rx="6"/>
  <text x="500" y="305" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">ESP32-WROOM-32</text>
  <text x="500" y="322" text-anchor="middle" font-size="10" fill="#fff">Type-C USB 串口</text>
  <g font-size="10" fill="#fff">
    <text x="395" y="345">3V3</text>
    <text x="395" y="365">GND</text>
    <text x="395" y="385">GPIO32</text>
    <text x="395" y="405">GPIO33</text>
    <text x="395" y="445">GPIO27</text>
  </g>
  <g fill="#fff">
    <circle cx="380" cy="342" r="3"/><circle cx="380" cy="362" r="3"/>
    <circle cx="380" cy="382" r="3"/><circle cx="380" cy="402" r="3"/>
    <circle cx="380" cy="442" r="3"/>
  </g>

  <!-- HX711 -->
  <rect x="100" y="300" width="160" height="120" fill="#f0ad4e" stroke="#333" stroke-width="2" rx="4"/>
  <text x="180" y="322" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">HX711 模块</text>
  <g font-size="9" fill="#fff">
    <text x="115" y="345">E+</text><text x="115" y="365">E-</text>
    <text x="115" y="385">A+</text><text x="115" y="405">A-</text>
    <text x="245" y="345" text-anchor="end">VCC</text>
    <text x="245" y="365" text-anchor="end">GND</text>
    <text x="245" y="385" text-anchor="end">SCK</text>
    <text x="245" y="405" text-anchor="end">DOUT</text>
  </g>
  <g fill="#fff">
    <circle cx="100" cy="342" r="3"/><circle cx="100" cy="362" r="3"/>
    <circle cx="100" cy="382" r="3"/><circle cx="100" cy="402" r="3"/>
    <circle cx="260" cy="342" r="3"/><circle cx="260" cy="362" r="3"/>
    <circle cx="260" cy="382" r="3"/><circle cx="260" cy="402" r="3"/>
  </g>

  <!-- S型传感器 -->
  <rect x="20" y="460" width="120" height="60" fill="#5cb85c" stroke="#333" stroke-width="2" rx="4"/>
  <text x="80" y="485" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">S型传感器</text>
  <text x="80" y="502" text-anchor="middle" font-size="9" fill="#fff">20N / 4线</text>

  <!-- 光电门 -->
  <rect x="720" y="300" width="140" height="80" fill="#e8554e" stroke="#333" stroke-width="2" rx="4"/>
  <text x="790" y="325" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">红外光电门</text>
  <text x="790" y="343" text-anchor="middle" font-size="9" fill="#fff">3线</text>
  <g fill="#fff">
    <circle cx="720" cy="360" r="3"/><circle cx="720" cy="375" r="3"/>
    <circle cx="860" cy="367" r="3"/>
  </g>
  <text x="735" y="363" font-size="8" fill="#fff">VCC</text>
  <text x="735" y="378" font-size="8" fill="#fff">GND</text>
  <text x="850" y="370" text-anchor="end" font-size="8" fill="#fff">DOUT</text>

  <!-- S型 -> HX711 -->
  <g stroke-width="1.8" fill="none">
    <path d="M 80 460 L 80 430 L 110 430 L 110 402" stroke="#c0392b"/>
    <text x="85" y="445" font-size="8" fill="#c0392b">E+ 红</text>
    <path d="M 95 460 L 95 425 L 118 425 L 118 382" stroke="#222"/>
    <text x="100" y="420" font-size="8" fill="#222">E- 黑</text>
    <path d="M 110 460 L 110 420 L 126 420 L 126 362" stroke="#27ae60"/>
    <text x="130" y="410" font-size="8" fill="#27ae60">A+ 绿</text>
    <path d="M 125 460 L 125 415 L 134 415 L 134 342" stroke="#bbb"/>
    <text x="138" y="395" font-size="8" fill="#888">A- 白</text>
  </g>

  <!-- HX711 -> ESP32 -->
  <g stroke-width="1.8" fill="none">
    <path d="M 260 342 L 380 342" stroke="#e67e22"/>
    <text x="300" y="338" font-size="8" fill="#e67e22">VCC→3V3</text>
    <path d="M 260 362 L 380 362" stroke="#222"/>
    <text x="300" y="358" font-size="8" fill="#222">GND→GND</text>
    <path d="M 260 382 L 380 382" stroke="#b8860b"/>
    <text x="300" y="378" font-size="8" fill="#b8860b">SCK→GPIO32</text>
    <path d="M 260 402 L 380 402" stroke="#27ae60"/>
    <text x="300" y="398" font-size="8" fill="#27ae60">DOUT→GPIO33</text>
  </g>

  <!-- 光电门 -> ESP32 -->
  <g stroke-width="1.8" fill="none">
    <path d="M 720 360 L 680 360 L 680 342 L 620 342" stroke="#e67e22"/>
    <text x="640" y="338" font-size="8" fill="#e67e22">VCC→3V3</text>
    <path d="M 720 375 L 660 375 L 660 362 L 620 362" stroke="#222"/>
    <text x="640" y="372" font-size="8" fill="#222">GND→GND</text>
    <path d="M 860 367 L 880 367 L 880 442 L 620 442" stroke="#8e44ad"/>
    <text x="850" y="430" font-size="8" fill="#8e44ad">DOUT→GPIO27</text>
  </g>

  <!-- USB -->
  <rect x="420" y="490" width="160" height="40" fill="#222" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="500" y="515" text-anchor="middle" font-size="11" fill="#fff">USB Type-C → 电脑</text>

  <!-- 引脚分配表 -->
  <text x="60" y="580" font-size="13" font-weight="bold">引脚分配表</text>
  <g font-size="11">
    <rect x="60" y="590" width="880" height="28" fill="#2874a6"/>
    <text x="80" y="608" fill="#fff" font-weight="bold">ESP32 引脚</text>
    <text x="240" y="608" fill="#fff" font-weight="bold">连接目标</text>
    <text x="480" y="608" fill="#fff" font-weight="bold">线色</text>
    <text x="620" y="608" fill="#fff" font-weight="bold">功能</text>
    <rect x="60" y="618" width="880" height="24" fill="#f0f7ff"/>
    <text x="80" y="635">3V3</text><text x="240" y="635">HX711 VCC + 光电门 VCC</text><text x="480" y="635">橙/红</text><text x="620" y="635">传感器供电 3.3V</text>
    <rect x="60" y="642" width="880" height="24" fill="#fff"/>
    <text x="80" y="659">GND</text><text x="240" y="659">HX711 GND + 光电门 GND</text><text x="480" y="659">黑</text><text x="620" y="659">共地</text>
    <rect x="60" y="666" width="880" height="24" fill="#f0f7ff"/>
    <text x="80" y="683">GPIO32</text><text x="240" y="683">HX711 SCK</text><text x="480" y="683">黄</text><text x="620" y="683">HX711 时钟线（输出）</text>
    <rect x="60" y="690" width="880" height="24" fill="#fff"/>
    <text x="80" y="707">GPIO33</text><text x="240" y="707">HX711 DOUT</text><text x="480" y="707">绿</text><text x="620" y="707">HX711 数据线（输入）</text>
  </g>
</svg>
