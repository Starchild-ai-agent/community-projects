<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="SimSun, serif">
  <rect width="900" height="520" fill="#fafafa"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold">图3 旋转臂与滑块零件图（3D打印件，单位：mm）</text>
  
  <!-- 旋转臂俯视图 -->
  <text x="80" y="70" font-size="13" font-weight="bold">旋转臂（俯视）</text>
  <rect x="80" y="85" width="380" height="24" fill="#d9a44a" stroke="#333" stroke-width="1.5"/>
  <!-- 中心孔 -->
  <circle cx="270" cy="97" r="8" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="270" y="100" text-anchor="middle" font-size="8">D16</text>
  <!-- 滑块槽 -->
  <rect x="380" y="88" width="30" height="18" fill="none" stroke="#e8554e" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="395" y="80" text-anchor="middle" font-size="8" fill="#e8554e">滑块槽</text>
  <!-- 配重槽 -->
  <rect x="130" y="88" width="30" height="18" fill="none" stroke="#777" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="145" y="80" text-anchor="middle" font-size="8" fill="#777">配重槽</text>
  <!-- 尺寸标注 -->
  <line x1="80" y1="125" x2="460" y2="125" stroke="#333" stroke-width="0.8"/>
  <line x1="80" y1="120" x2="80" y2="130" stroke="#333"/>
  <line x1="460" y1="120" x2="460" y2="130" stroke="#333"/>
  <text x="270" y="120" text-anchor="middle" font-size="10">380</text>
  <line x1="470" y1="85" x2="470" y2="109" stroke="#333" stroke-width="0.8"/>
  <line x1="465" y1="85" x2="475" y2="85" stroke="#333"/>
  <line x1="465" y1="109" x2="475" y2="109" stroke="#333"/>
  <text x="485" y="100" font-size="10">24</text>
  
  <!-- 滑块三视图 -->
  <text x="80" y="180" font-size="13" font-weight="bold">滑块（三视图，50g/100g/150g三档）</text>
  
  <!-- 主视图 -->
  <text x="100" y="205" font-size="10">主视图</text>
  <rect x="100" y="215" width="40" height="30" fill="#e8554e" stroke="#333" stroke-width="1.5"/>
  <line x1="155" y1="215" x2="155" y2="245" stroke="#333" stroke-width="0.8"/>
  <line x1="150" y1="215" x2="160" y2="215" stroke="#333"/>
  <line x1="150" y1="245" x2="160" y2="245" stroke="#333"/>
  <text x="168" y="233" font-size="9">30</text>
  <line x1="100" y1="260" x2="140" y2="260" stroke="#333" stroke-width="0.8"/>
  <line x1="100" y1="255" x2="100" y2="265" stroke="#333"/>
  <line x1="140" y1="255" x2="140" y2="265" stroke="#333"/>
  <text x="120" y="275" text-anchor="middle" font-size="9">40</text>
  
  <!-- 俯视图 -->
  <text x="240" y="205" font-size="10">俯视图</text>
  <rect x="240" y="215" width="40" height="24" fill="#e8554e" stroke="#333" stroke-width="1.5"/>
  <circle cx="260" cy="227" r="3" fill="#fff" stroke="#333"/>
  <text x="260" y="230" text-anchor="middle" font-size="6">M3</text>
  <line x1="295" y1="215" x2="295" y2="239" stroke="#333" stroke-width="0.8"/>
  <line x1="290" y1="215" x2="300" y2="215" stroke="#333"/>
  <line x1="290" y1="239" x2="300" y2="239" stroke="#333"/>
  <text x="308" y="230" font-size="9">24</text>
  
  <!-- 侧视图 -->
  <text x="380" y="205" font-size="10">侧视图</text>
  <rect x="380" y="215" width="24" height="30" fill="#e8554e" stroke="#333" stroke-width="1.5"/>
  <line x1="435" y1="215" x2="435" y2="245" stroke="#333" stroke-width="0.8"/>
  <line x1="430" y1="215" x2="440" y2="215" stroke="#333"/>
  <line x1="430" y1="245" x2="440" y2="245" stroke="#333"/>
  <text x="448" y="233" font-size="9">30</text>
  
  <!-- 质量配置表 -->
  <text x="540" y="205" font-size="10" font-weight="bold">质量档位（内部填充铅粒）</text>
  <g font-size="10">
    <rect x="540" y="215" width="280" height="22" fill="none" stroke="#333"/>
    <rect x="540" y="237" width="280" height="22" fill="none" stroke="#333"/>
    <rect x="540" y="259" width="280" height="22" fill="none" stroke="#333"/>
    <line x1="620" y1="215" x2="620" y2="281" stroke="#333"/>
    <line x1="720" y1="215" x2="720" y2="281" stroke="#333"/>
    <text x="580" y="231" text-anchor="middle" font-weight="bold">档位</text>
    <text x="670" y="231" text-anchor="middle" font-weight="bold">质量</text>
    <text x="800" y="231" text-anchor="middle" font-weight="bold">铅粒填充量</text>
    <text x="580" y="253" text-anchor="middle">轻档</text>
    <text x="670" y="253" text-anchor="middle">50 g</text>
    <text x="800" y="253" text-anchor="middle">约 28 g</text>
    <text x="580" y="275" text-anchor="middle">中档</text>
    <text x="670" y="275" text-anchor="middle">100 g</text>
    <text x="800" y="275" text-anchor="middle">约 78 g</text>
  </g>
  
  <!-- 打印参数 -->
  <text x="80" y="320" font-size="13" font-weight="bold">3D打印参数</text>
  <g font-size="10">
    <text x="100" y="342">材料：PLA（聚乳酸），直径1.75 mm</text>
    <text x="100" y="360">层高：0.2 mm；填充率：30%（网格填充）；壁厚：1.2 mm（3层）</text>
    <text x="100" y="378">喷嘴温度：200 ℃；热床温度：60 ℃；打印速度：50 mm/s</text>
    <text x="100" y="396">旋转臂建议打印时间约2.5 h，耗材约18 g；滑块每只约0.5 h，耗材约6 g</text>
  </g>
  
  <!-- 装配说明 -->
  <text x="80" y="430" font-size="13" font-weight="bold">装配关系</text>
  <g font-size="10">
    <text x="100" y="452">1.旋转臂中心D16孔套入电机轴，用M3顶丝紧定。</text>
    <text x="100" y="470">2.滑块从旋转臂右端槽口滑入，用M3螺丝穿过滑块M3孔与臂定位孔固定。</text>
    <text x="100" y="488">3.S型传感器两端分别用M4螺丝连接滑块与臂端，构成力测量链。</text>
  </g>
  
  <text x="450" y="510" text-anchor="middle" font-size="9" fill="#888">注：本图为示意，实际加工以3D模型文件（.stl）为准。尺寸可按电机轴径微调。</text>
</svg>
