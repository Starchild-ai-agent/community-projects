<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" font-family="SimSun, serif">
  <!-- 背景 -->
  <rect width="900" height="900" fill="#fafafa"/>

  <!-- 总标题 -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold">图1 向心力定量演示仪装置总图</text>

  <!-- ============ 上半部分：侧视图（正面视角） ============ -->
  <text x="450" y="55" text-anchor="middle" font-size="13" fill="#666" font-weight="bold">（a）侧视图</text>

  <!-- 底座 -->
  <rect x="200" y="380" width="500" height="30" fill="#888" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="428" text-anchor="middle" font-size="11">底座（钢板 500×300×10）</text>

  <!-- 立柱 -->
  <rect x="440" y="120" width="20" height="260" fill="#aaa" stroke="#333" stroke-width="1"/>

  <!-- 电机 -->
  <rect x="410" y="110" width="80" height="40" fill="#4a90d9" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="450" y="134" text-anchor="middle" font-size="10" fill="#fff">直流调速电机</text>

  <!-- 转轴 -->
  <line x1="450" y1="110" x2="450" y2="95" stroke="#333" stroke-width="3"/>

  <!-- 旋转臂（水平，侧视看是一条厚条） -->
  <rect x="250" y="90" width="380" height="10" fill="#d9a44a" stroke="#333" stroke-width="1.5"/>
  <text x="445" y="86" text-anchor="end" font-size="10">旋转臂（3D打印 PLA）</text>

  <!-- 转动中心节点 -->
  <circle cx="450" cy="95" r="6" fill="#333"/>

  <!-- 滑块（右侧） -->
  <rect x="560" y="80" width="30" height="30" fill="#e8554e" stroke="#333" stroke-width="1.5"/>
  <text x="575" y="100" text-anchor="middle" font-size="9" fill="#fff">滑块</text>
  <text x="575" y="125" text-anchor="middle" font-size="9">m=100g</text>

  <!-- 半径标注 r -->
  <line x1="450" y1="60" x2="575" y2="60" stroke="#e8554e" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="450" y1="55" x2="450" y2="65" stroke="#e8554e" stroke-width="1"/>
  <line x1="575" y1="55" x2="575" y2="65" stroke="#e8554e" stroke-width="1"/>
  <text x="512" y="53" text-anchor="middle" font-size="11" fill="#e8554e">r = 15 cm</text>

  <!-- S型拉压力传感器 -->
  <rect x="535" y="85" width="22" height="20" fill="#5cb85c" stroke="#333" stroke-width="1.2"/>
  <text x="546" y="99" text-anchor="middle" font-size="7" fill="#fff">S型</text>
  <text x="546" y="120" text-anchor="middle" font-size="8">传感器</text>

  <!-- 配重（左侧） -->
  <rect x="270" y="80" width="30" height="30" fill="#777" stroke="#333" stroke-width="1.5"/>
  <text x="285" y="100" text-anchor="middle" font-size="9" fill="#fff">配重</text>

  <!-- 红外光电门 -->
  <rect x="600" y="75" width="14" height="30" fill="#f0ad4e" stroke="#333" stroke-width="1"/>
  <text x="607" y="120" text-anchor="middle" font-size="8">光电门</text>

  <!-- 角速度方向标注 -->
  <path d="M 510 95 A 60 60 0 0 1 530 140" fill="none" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="545" y="150" font-size="11" fill="#4a90d9">ω</text>

  <!-- ESP32 控制盒 -->
  <rect x="120" y="350" width="120" height="60" fill="#5cb85c" stroke="#333" stroke-width="1.5" rx="4"/>
  <text x="180" y="375" text-anchor="middle" font-size="10" fill="#fff">ESP32 + HX711</text>
  <text x="180" y="392" text-anchor="middle" font-size="8" fill="#fff">数据采集&amp;蓝牙</text>

  <!-- 信号线 -->
  <path d="M 546 105 Q 400 250 240 350" fill="none" stroke="#5cb85c" stroke-width="1.2" stroke-dasharray="3,2"/>
  <path d="M 607 105 Q 450 280 240 350" fill="none" stroke="#f0ad4e" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- 手机 -->
  <rect x="720" y="330" width="70" height="120" fill="#222" stroke="#333" stroke-width="1.5" rx="6"/>
  <rect x="728" y="342" width="54" height="96" fill="#4a90d9" rx="2"/>
  <text x="755" y="395" text-anchor="middle" font-size="8" fill="#fff">APP</text>
  <text x="755" y="410" text-anchor="middle" font-size="7" fill="#fff">F-ω²图</text>
  <text x="755" y="465" text-anchor="middle" font-size="9">手机</text>

  <!-- 蓝牙虚线 -->
  <path d="M 240 380 Q 480 280 720 370" fill="none" stroke="#4a90d9" stroke-width="1.2" stroke-dasharray="2,3"/>
  <text x="480" y="315" text-anchor="middle" font-size="9" fill="#4a90d9">蓝牙传输</text>

  <!-- 分隔线 -->
  <line x1="50" y1="460" x2="850" y2="460" stroke="#ccc" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ============ 下半部分：俯视图（从上方看下去） ============ -->
  <text x="450" y="485" text-anchor="middle" font-size="13" fill="#666" font-weight="bold">（b）俯视图（从上方俯视）</text>

  <!-- 底座外轮廓（俯视看是矩形） -->
  <rect x="250" y="760" width="400" height="80" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="855" text-anchor="middle" font-size="10" fill="#888">底座 500×300（俯视轮廓）</text>

  <!-- 立柱（俯视看是圆） -->
  <circle cx="450" cy="650" r="12" fill="#aaa" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="654" text-anchor="middle" font-size="8" fill="#fff">立柱</text>

  <!-- 电机（俯视看是圆，套在立柱外） -->
  <circle cx="450" cy="650" r="22" fill="none" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="450" y="630" text-anchor="middle" font-size="8" fill="#4a90d9">电机</text>

  <!-- 旋转臂（俯视看是长条，水平方向） -->
  <rect x="260" y="645" width="380" height="10" fill="#d9a44a" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="640" text-anchor="middle" font-size="9">旋转臂 380mm</text>

  <!-- 旋转臂尺寸标注 -->
  <line x1="260" y1="620" x2="640" y2="620" stroke="#333" stroke-width="0.8"/>
  <line x1="260" y1="615" x2="260" y2="625" stroke="#333"/>
  <line x1="640" y1="615" x2="640" y2="625" stroke="#333"/>
  <text x="450" y="615" text-anchor="middle" font-size="10">380</text>

  <!-- 转动中心 -->
  <circle cx="450" cy="650" r="4" fill="#333"/>

  <!-- 滑块（俯视看是矩形，在臂右侧） -->
  <rect x="560" y="635" width="30" height="30" fill="#e8554e" stroke="#333" stroke-width="1.5"/>
  <text x="575" y="655" text-anchor="middle" font-size="8" fill="#fff">滑块</text>

  <!-- S型传感器（滑块与臂之间） -->
  <rect x="535" y="640" width="22" height="20" fill="#5cb85c" stroke="#333" stroke-width="1.2"/>
  <text x="546" y="654" text-anchor="middle" font-size="6" fill="#fff">S型</text>

  <!-- 配重（臂左侧） -->
  <rect x="270" y="635" width="30" height="30" fill="#777" stroke="#333" stroke-width="1.5"/>
  <text x="285" y="655" text-anchor="middle" font-size="8" fill="#fff">配重</text>

  <!-- 半径标注 r（俯视图） -->
  <line x1="450" y1="690" x2="575" y2="690" stroke="#e8554e" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="450" y1="685" x2="450" y2="695" stroke="#e8554e" stroke-width="1"/>
  <line x1="575" y1="685" x2="575" y2="695" stroke="#e8554e" stroke-width="1"/>
  <text x="512" y="708" text-anchor="middle" font-size="11" fill="#e8554e">r = 15 cm（转动中心→滑块）</text>

  <!-- 滑块运动轨迹（俯视看是圆弧） -->
  <circle cx="450" cy="650" r="125" fill="none" stroke="#e8554e" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="320" y="650" font-size="8" fill="#e8554e">滑块圆周轨迹</text>

  <!-- 角速度方向（俯视看是顺时针圆弧箭头） -->
  <path d="M 540 580 A 70 70 0 1 0 540 720" fill="none" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="575" font-size="14" fill="#4a90d9" font-weight="bold">ω</text>
  <text x="560" y="590" font-size="9" fill="#4a90d9">角速度方向</text>

  <!-- 红外光电门（俯视看在臂外侧） -->
  <rect x="600" y="630" width="14" height="30" fill="#f0ad4e" stroke="#333" stroke-width="1"/>
  <text x="607" y="675" text-anchor="middle" font-size="8">光电门</text>
  <line x1="607" y1="645" x2="607" y2="665" stroke="#c00" stroke-width="0.8"/>

  <!-- 向心力F方向标注（指向圆心） -->
  <line x1="575" y1="635" x2="575" y2="610" stroke="#c00" stroke-width="0.8"/>
  <text x="580" y="608" font-size="10" fill="#c00">F→圆心</text>

  <!-- 速度v方向标注（切线方向） -->
  <line x1="575" y1="665" x2="610" y2="665" stroke="#27ae60" stroke-width="0.8" marker-end="url(#arrowG)"/>
  <text x="615" y="668" font-size="10" fill="#27ae60">v（切线）</text>

  <!-- 图例 -->
  <rect x="60" y="500" width="780" height="40" fill="none" stroke="#ccc"/>
  <text x="75" y="518" font-size="10" font-weight="bold">图例：</text>
  <rect x="130" y="510" width="14" height="10" fill="#e8554e"/><text x="150" y="519" font-size="9">滑块</text>
  <rect x="200" y="510" width="14" height="10" fill="#5cb85c"/><text x="220" y="519" font-size="9">S型力传感器</text>
  <rect x="310" y="510" width="14" height="10" fill="#f0ad4e"/><text x="330" y="519" font-size="9">光电门</text>
  <rect x="400" y="510" width="14" height="10" fill="#d9a44a"/><text x="420" y="519" font-size="9">旋转臂(PLA)</text>
  <rect x="510" y="510" width="14" height="10" fill="#4a90d9"/><text x="530" y="519" font-size="9">电机/蓝牙</text>
  <text x="75" y="535" font-size="9">数据流：力F→S型传感器→HX711→ESP32⇒蓝牙⇒手机APP绘图；周期T→光电门→ESP32</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#27ae60"/>
    </marker>
  </defs>
</svg>
