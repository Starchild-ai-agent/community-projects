<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Child</title>
  <style>
    :root{
      --bg:#08060a;
      --ink:#fff5e6;
      --o1:#ffb347;
      --o2:#ff7a00;
      --o3:#ff3d00;
      --o4:#ffd089;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;overflow:hidden;background:#000;cursor:none}
    body{
      font-family:"Inter","Helvetica Neue",Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at var(--mx,50%) var(--my,50%),
          rgba(255,122,0,.32), rgba(255,61,0,.14) 22%, transparent 55%),
        radial-gradient(1200px 800px at 50% 50%, rgba(255,122,0,.10), transparent 60%),
        radial-gradient(800px 600px at 20% 80%, rgba(255,61,0,.10), transparent 70%),
        radial-gradient(800px 600px at 80% 20%, rgba(255,179,71,.10), transparent 70%),
        var(--bg);
      display:grid;
      place-items:center;
      perspective:1200px;
    }

    /* The only visible element */
    .sc{
      position:relative;
      display:inline-flex;
      gap:.04em;
      font-weight:900;
      font-size:clamp(56px, 14vw, 200px);
      letter-spacing:.02em;
      text-decoration:none;
      color:transparent;
      cursor:none;
      transform-style:preserve-3d;
      animation:breathe 4.6s ease-in-out infinite, jitter 7s ease-in-out infinite;
      filter:drop-shadow(0 0 24px rgba(255,122,0,.45));
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .sc span{
      display:inline-block;
      background:linear-gradient(100deg,
        #fff7e8 0%,
        var(--o4) 18%,
        var(--o1) 34%,
        var(--o2) 52%,
        var(--o3) 70%,
        var(--o2) 86%,
        var(--o4) 100%);
      background-size:300% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:flow 5s linear infinite, drop 1.1s cubic-bezier(.2,.9,.2,1.2) backwards;
      transition:transform .25s cubic-bezier(.2,.9,.2,1.4), filter .25s ease;
      text-shadow:
        0 0 18px rgba(255,122,0,.0),
        0 0 36px rgba(255,61,0,.0);
      will-change:transform, filter, text-shadow;
    }

    .sc span.gap{width:.32em;background:none}

    /* Stagger entry per character */
    .sc span:nth-child(1){animation-delay:0s, .00s}
    .sc span:nth-child(2){animation-delay:0s, .06s}
    .sc span:nth-child(3){animation-delay:0s, .12s}
    .sc span:nth-child(4){animation-delay:0s, .18s}
    .sc span:nth-child(5){animation-delay:0s, .24s}
    .sc span:nth-child(6){animation-delay:0s, .30s}
    .sc span:nth-child(7){animation-delay:0s, .36s}
    .sc span:nth-child(8){animation-delay:0s, .42s}
    .sc span:nth-child(9){animation-delay:0s, .48s}
    .sc span:nth-child(10){animation-delay:0s, .54s}

    /* Hover: lift each char with 3D tilt + intense glow */
    .sc:hover span{
      filter:drop-shadow(0 6px 18px rgba(255,61,0,.55));
      text-shadow:
        0 0 18px rgba(255,179,71,.7),
        0 0 42px rgba(255,122,0,.65),
        0 0 80px rgba(255,61,0,.45);
    }
    .sc span:hover{
      transform:translateY(-10px) rotateX(14deg) rotateY(-10deg) scale(1.18);
    }

    /* Custom cursor — a glowing ember */
    .ember{
      position:fixed;
      left:0;top:0;
      width:22px;height:22px;
      border-radius:50%;
      background:radial-gradient(circle, #fff5e6 0%, var(--o1) 35%, var(--o3) 70%, transparent 75%);
      mix-blend-mode:screen;
      pointer-events:none;
      transform:translate(-50%,-50%);
      filter:blur(.4px) drop-shadow(0 0 14px rgba(255,122,0,.85));
      transition:transform .12s ease;
      z-index:9;
    }

    @keyframes flow{
      0%{background-position:0% 50%}
      100%{background-position:300% 50%}
    }
    @keyframes breathe{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.03)}
    }
    @keyframes jitter{
      0%,100%{translate:0 0}
      25%{translate:.4px -.4px}
      50%{translate:-.3px .5px}
      75%{translate:.5px .2px}
    }
    @keyframes drop{
      0%{opacity:0;transform:translateY(-40px) rotateX(-50deg);filter:blur(8px)}
      60%{opacity:1;transform:translateY(6px) rotateX(8deg);filter:blur(0)}
      100%{transform:translateY(0) rotateX(0)}
    }

    @media (hover:none){
      html,body,.sc{cursor:auto}
      .ember{display:none}
      .sc span:active{transform:translateY(-6px) scale(1.1)}
    }
  </style>
</head>
<body>
  <a class="sc" href="https://iamstarchild.com" target="_blank" rel="noopener noreferrer" aria-label="Star Child">
    <span>S</span><span>t</span><span>a</span><span>r</span><span class="gap"> </span><span>C</span><span>h</span><span>i</span><span>l</span><span>d</span>
  </a>
  <div class="ember" id="ember" aria-hidden="true"></div>
  <script>
    const ember = document.getElementById('ember');
    const root = document.documentElement;
    let tx=window.innerWidth/2, ty=window.innerHeight/2, cx=tx, cy=ty;
    addEventListener('pointermove', e=>{
      tx=e.clientX; ty=e.clientY;
      root.style.setProperty('--mx', (tx/window.innerWidth*100)+'%');
      root.style.setProperty('--my', (ty/window.innerHeight*100)+'%');
    });
    function loop(){
      cx += (tx-cx)*0.18; cy += (ty-cy)*0.18;
      ember.style.transform = `translate(${cx}px, ${cy}px) translate(-50%,-50%)`;
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
