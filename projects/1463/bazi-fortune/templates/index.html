<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生辰八字算命</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f1e 60%, #000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #d4af37;
        }
        .container {
            background: rgba(20, 20, 35, 0.85);
            border: 1px solid #d4af37;
            border-radius: 12px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.25);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: 4px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #e8c547;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #6b5b1e;
            border-radius: 6px;
            color: #ffd700;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus, select:focus {
            border-color: #d4af37;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row .form-group {
            flex: 1;
        }
        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(135deg, #d4af37, #8b6914);
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 4px;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .hint {
            font-size: 12px;
            color: #8b7a3a;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 生辰八字算命</h1>
        <form action="calculate" method="POST">
            <div class="form-group">
                <label for="year">公历年份</label>
                <input type="number" id="year" name="year" min="1900" max="2100" required placeholder="如：1990">
                <div class="hint">范围：1900 - 2100</div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="month">月份</label>
                    <input type="number" id="month" name="month" min="1" max="12" required placeholder="1-12">
                </div>
                <div class="form-group">
                    <label for="day">日期</label>
                    <input type="number" id="day" name="day" min="1" max="31" required placeholder="1-31">
                </div>
            </div>
            <div class="form-group">
                <label for="hour">时辰</label>
                <select id="hour" name="hour" required>
                    {% for val, label in hour_options %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn">开 始 推 算</button>
        </form>
    </div>
</body>
</html>
