<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decarbon Alpha War Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef4fb;
      --surface: #ffffff;
      --surface-2: #f6f9fc;
      --text: #121a24;
      --muted: #5c6d82;
      --accent: #2563a8;
      --accent-soft: #dceaf9;
      --good: #118a57;
      --warn: #a36910;
      --bad: #b73a3a;
      --border: #d6e0ea;
      --shadow: 0 10px 26px rgba(18, 26, 36, 0.08);
    }

    [data-theme="dark"] {
      --bg: #11161d;
      --surface: #1a2029;
      --surface-2: #232b36;
      --text: #e7edf5;
      --muted: #9eb1c9;
      --accent: #6aa7e1;
      --accent-soft: #21364f;
      --good: #34b67b;
      --warn: #f0b44f;
      --bad: #ff7a7a;
      --border: #344153;
      --shadow: 0 10px 26px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Sora", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 24px; }
    .topbar {
      display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center;
      margin-bottom: 18px;
    }
    .title { font-size: clamp(1.5rem, 2.2vw, 2.2rem); letter-spacing: -0.02em; margin: 0; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 0.95rem; }
    .toggle {
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      border-radius: 12px; padding: 10px 14px; cursor: pointer; min-height: 44px; min-width: 44px;
    }

    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      box-shadow: var(--shadow); padding: 14px 16px;
    }
    .metric { grid-column: span 2; }
    .metric h3 { margin: 0 0 8px; font-size: 0.82rem; color: var(--muted); font-weight: 600; }
    .metric p { margin: 0; font-size: 1.25rem; font-weight: 700; letter-spacing: -0.015em; }

    .regime { grid-column: span 12; display: flex; align-items: center; gap: 12px; }
    .badge { border-radius: 999px; padding: 6px 12px; font-weight: 700; font-size: 0.82rem; }
    .badge.RISK_ON { background: rgba(17, 138, 87, 0.14); color: var(--good); }
    .badge.RISK_OFF { background: rgba(163, 105, 16, 0.14); color: var(--warn); }
    .badge.PANIC { background: rgba(183, 58, 58, 0.14); color: var(--bad); }

    .table-card { grid-column: span 12; overflow: hidden; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--border); text-align: left; font-size: 0.9rem; }
    th { color: var(--muted); font-weight: 600; font-size: 0.8rem; }

    .tag { border-radius: 999px; padding: 3px 8px; font-size: 0.75rem; font-weight: 700; }
    .BUY_NOW { color: var(--good); background: rgba(17, 138, 87, 0.12); }
    .WATCH { color: var(--warn); background: rgba(163, 105, 16, 0.12); }
    .AVOID { color: var(--bad); background: rgba(183, 58, 58, 0.12); }

    .footer { margin-top: 14px; color: var(--muted); font-size: 0.82rem; }

    @media (max-width: 980px) {
      .metric { grid-column: span 6; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 class="title">Decarbon Alpha War Room</h1>
        <p class="subtitle">Selloff opportunities with regime-aware execution levels.</p>
      </div>
      <button class="toggle" id="themeToggle" aria-label="Toggle light and dark theme">Toggle theme</button>
    </div>

    <section class="grid" id="metrics"></section>

    <section class="card regime">
      <strong>Regime:</strong>
      <span id="regimeBadge" class="badge">Loading...</span>
      <span id="asof" class="subtitle"></span>
    </section>

    <section class="card table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ticker</th><th>Current</th><th>Day %</th><th>First Buy</th><th>Add1 (-8%)</th><th>Add2 (-15%)</th>
              <th>Stop</th><th>Target</th><th>Upside</th><th>Regime Tag</th><th>Action</th>
              <th>First Amt</th><th>Add1 Amt</th><th>Add2 Amt</th><th>First Sh</th><th>Add1 Sh</th><th>Add2 Sh</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="footer">Execution only. Not investment advice. Refreshes every 60s.</div>
    </section>
  </div>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const root = document.documentElement;

    const savedTheme = localStorage.getItem('warroom-theme');
    if (savedTheme) {
      root.setAttribute('data-theme', savedTheme);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      root.setAttribute('data-theme', 'dark');
    }

    themeToggle.addEventListener('click', () => {
      const current = root.getAttribute('data-theme') || 'light';
      const next = current === 'light' ? 'dark' : 'light';
      root.setAttribute('data-theme', next);
      localStorage.setItem('warroom-theme', next);
    });

    function tone(val) {
      if (val <= -3) return 'var(--bad)';
      if (val <= -1) return 'var(--warn)';
      return 'var(--good)';
    }

    function metricCard(name, close, pct) {
      return `
        <article class="card metric">
          <h3>${name}</h3>
          <p>${close.toFixed(2)} <span style="color:${tone(pct)};font-size:.9rem;">${pct.toFixed(2)}%</span></p>
        </article>
      `;
    }

    async function loadSnapshot() {
      const res = await fetch('api/snapshot');
      const data = await res.json();

      const m = data.benchmarks || {};
      const metrics = document.getElementById('metrics');
      metrics.innerHTML = ['SPY', 'QQQ', 'SOXX', 'XLK', 'XLV', 'XLF']
        .filter(k => m[k])
        .map(k => metricCard(k, m[k].close, m[k].percent_change))
        .join('');

      const regimeBadge = document.getElementById('regimeBadge');
      regimeBadge.textContent = data.regime || 'N/A';
      regimeBadge.className = `badge ${data.regime || ''}`;

      document.getElementById('asof').textContent = `As of ${new Date(data.asof_utc).toLocaleString()}`;

      const rows = document.getElementById('rows');
      rows.innerHTML = (data.rows || []).map(r => `
        <tr>
          <td><strong>${r.ticker}</strong></td>
          <td>${r.current.toFixed(2)}</td>
          <td style="color:${tone(r.day_change_pct)}">${r.day_change_pct.toFixed(2)}%</td>
          <td>${r.first_buy}</td>
          <td>${r.add1.toFixed(2)}</td>
          <td>${r.add2.toFixed(2)}</td>
          <td>${r.stop.toFixed(2)}</td>
          <td>${r.target.toFixed(2)}</td>
          <td>${r.upside_pct.toFixed(1)}%</td>
          <td>${r.regime_tag}</td>
          <td><span class="tag ${r.action}">${r.action}</span></td>
          <td>${r.amount_first.toFixed(0)}</td>
          <td>${r.amount_add1.toFixed(0)}</td>
          <td>${r.amount_add2.toFixed(0)}</td>
          <td>${r.shares_first}</td>
          <td>${r.shares_add1}</td>
          <td>${r.shares_add2}</td>
        </tr>
      `).join('');
    }

    loadSnapshot().catch(console.error);
    setInterval(() => loadSnapshot().catch(console.error), 60000);
  </script>
</body>
</html>
