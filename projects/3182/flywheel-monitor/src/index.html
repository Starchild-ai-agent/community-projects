<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flywheel Monitor</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2e;
      --soft: #1a2340;
      --text: #e9eeff;
      --muted: #9aabcf;
      --accent: #6ea8fe;
      --good: #37d39a;
      --warn: #ffd166;
      --bad: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 85% -15%, #23386a 0%, var(--bg) 55%);
      color: var(--text);
    }
    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 28px 20px 36px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0.3px;
    }
    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      max-width: 720px;
      line-height: 1.45;
    }
    select {
      background: var(--soft);
      color: var(--text);
      border: 1px solid #2a3761;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      min-width: 240px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }
    .card {
      background: linear-gradient(180deg, #141d36 0%, #11172a 100%);
      border: 1px solid #243256;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(8, 12, 25, 0.25);
    }
    .kpi { grid-column: span 3; min-height: 106px; }
    .kpi .label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .kpi .value { font-size: 27px; font-weight: 700; }
    .kpi .delta { margin-top: 6px; font-size: 12px; }
    .positive { color: var(--good); }
    .negative { color: var(--bad); }

    .wide { grid-column: span 8; }
    .side { grid-column: span 4; }

    .section-title {
      font-size: 14px;
      color: #c6d3f5;
      margin-bottom: 12px;
      letter-spacing: 0.2px;
    }

    .bars {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 190px 1fr 55px;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .track {
      height: 12px;
      background: #1e2a4a;
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      border-radius: 999px;
      transition: width 350ms ease;
    }

    .insight {
      line-height: 1.5;
      font-size: 14px;
      color: #dbe5ff;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      border-radius: 999px;
      padding: 5px 9px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .dot {
      width: 10px;
      height: 10px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 5px;
      transform: translateY(1px);
    }

    canvas {
      width: 100%;
      height: 270px;
      background: #10172d;
      border-radius: 10px;
      border: 1px solid #243256;
    }

    @media (max-width: 980px) {
      .kpi { grid-column: span 6; }
      .wide, .side { grid-column: span 12; }
      .bar-row { grid-template-columns: 150px 1fr 45px; }
    }

    @media (max-width: 620px) {
      .kpi { grid-column: span 12; }
      h1 { font-size: 24px; }
      .bar-row { grid-template-columns: 1fr; gap: 6px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Flywheel Monitor</h1>
        <div class="subtitle">
          Track execution quality as one compounding loop:
          deployment → recurring revenue → reinvestment → unit-cost decline → faster deployment.
        </div>
      </div>
      <select id="companySelect"></select>
    </div>

    <div class="grid" id="kpiGrid"></div>

    <div class="grid">
      <div class="card wide">
        <div class="section-title">Loop Stage Scores (latest period)</div>
        <div class="bars" id="stageBars"></div>
      </div>
      <div class="card side">
        <div class="section-title">Execution Diagnosis</div>
        <div id="diagnosis"></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Timeline: Stage Strength by Reporting Period</div>
      <canvas id="timeline" width="1080" height="300"></canvas>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <script>
    const companies = {
      "SpaceX": {
        currency: "USD",
        periods: ["2024-H1", "2024-H2", "2025-H1", "2025-H2", "2026-H1"],
        stages: {
          deployment: [58, 64, 72, 84, 92],
          recurringRevenue: [55, 61, 68, 79, 88],
          reinvestment: [62, 66, 74, 82, 90],
          unitCost: [48, 56, 65, 78, 87],
          cycleSpeed: [52, 57, 67, 81, 90]
        },
        metrics: {
          launchCadencePerMonth: [8.1, 8.8, 9.6, 10.9, 12.2],
          satDeployPerMonth: [140, 158, 171, 194, 220],
          networkUtilizationPct: [46, 51, 57, 64, 71],
          cashGenerationBn: [1.9, 2.2, 2.8, 3.4, 4.1],
          costToOrbitIndex: [100, 92, 85, 76, 67]
        }
      },
      "Rocket Lab": {
        currency: "USD",
        periods: ["2024-H1", "2024-H2", "2025-H1", "2025-H2", "2026-H1"],
        stages: {
          deployment: [50, 54, 61, 67, 73],
          recurringRevenue: [45, 49, 55, 61, 68],
          reinvestment: [52, 57, 60, 66, 70],
          unitCost: [44, 48, 54, 60, 66],
          cycleSpeed: [47, 50, 56, 63, 69]
        },
        metrics: {
          launchCadencePerMonth: [1.6, 1.8, 2.1, 2.3, 2.6],
          satDeployPerMonth: [18, 21, 26, 30, 34],
          networkUtilizationPct: [33, 37, 42, 47, 52],
          cashGenerationBn: [0.22, 0.28, 0.34, 0.42, 0.55],
          costToOrbitIndex: [100, 97, 93, 89, 84]
        }
      },
      "DeepTech Co (Template)": {
        currency: "USD",
        periods: ["2024-H1", "2024-H2", "2025-H1", "2025-H2", "2026-H1"],
        stages: {
          deployment: [40, 44, 49, 53, 58],
          recurringRevenue: [35, 39, 45, 50, 56],
          reinvestment: [46, 48, 53, 57, 62],
          unitCost: [37, 41, 46, 52, 57],
          cycleSpeed: [39, 42, 47, 54, 59]
        },
        metrics: {
          launchCadencePerMonth: [0.8, 0.9, 1.0, 1.2, 1.4],
          satDeployPerMonth: [6, 8, 10, 12, 14],
          networkUtilizationPct: [22, 26, 31, 35, 40],
          cashGenerationBn: [0.06, 0.08, 0.11, 0.15, 0.19],
          costToOrbitIndex: [100, 99, 97, 94, 90]
        }
      }
    };

    const stageMeta = [
      { key: "deployment", name: "Product Deployment", color: "#6ea8fe" },
      { key: "recurringRevenue", name: "Recurring Revenue", color: "#37d39a" },
      { key: "reinvestment", name: "Reinvestment Capacity", color: "#ffd166" },
      { key: "unitCost", name: "Unit-Cost Improvement", color: "#ff8fab" },
      { key: "cycleSpeed", name: "Cycle Speed", color: "#b48bff" }
    ];

    const selectEl = document.getElementById("companySelect");
    const kpiGrid = document.getElementById("kpiGrid");
    const stageBars = document.getElementById("stageBars");
    const diagnosisEl = document.getElementById("diagnosis");
    const canvas = document.getElementById("timeline");
    const ctx = canvas.getContext("2d");
    const legendEl = document.getElementById("legend");

    Object.keys(companies).forEach((name) => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      selectEl.appendChild(opt);
    });

    function avg(arr) {
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function pctDelta(first, last) {
      if (!first) return 0;
      return ((last - first) / first) * 100;
    }

    function velocityScore(data) {
      const latestAvg = avg(stageMeta.map(s => data.stages[s.key].at(-1)));
      const earlyAvg = avg(stageMeta.map(s => data.stages[s.key][0]));
      const gain = latestAvg - earlyAvg;
      const stabilityPenalty = stageMeta
        .map(s => Math.abs(data.stages[s.key].at(-1) - data.stages[s.key].at(-2 || 0)))
        .reduce((a, b) => a + b, 0) / stageMeta.length;
      return Math.max(0, Math.min(100, latestAvg + gain * 0.6 - stabilityPenalty * 0.2));
    }

    function diagnosis(score) {
      if (score >= 82) return { label: "Compounding", tone: "good", text: "The loop is reinforcing itself. Management can prioritize scale while guarding execution quality." };
      if (score >= 68) return { label: "Building Momentum", tone: "warn", text: "The loop is working but uneven. Focus on bottlenecks between revenue capture and reinvestment throughput." };
      return { label: "Fragile Loop", tone: "bad", text: "The loop has weak handoffs. Improve deployment reliability and capital recycling before accelerating growth spend." };
    }

    function formatNum(v, digits = 1) {
      return Number(v).toLocaleString(undefined, { maximumFractionDigits: digits });
    }

    function renderKPIs(name) {
      const d = companies[name];
      const m = d.metrics;
      const score = velocityScore(d);

      const cards = [
        { label: "Loop Velocity Score", value: formatNum(score, 0), suffix: "/100", delta: `+${formatNum(score - 50, 1)} vs baseline`, positive: score >= 68 },
        {
          label: "Launch Cadence / Month",
          value: formatNum(m.launchCadencePerMonth.at(-1), 1),
          suffix: "",
          delta: `${formatNum(pctDelta(m.launchCadencePerMonth[0], m.launchCadencePerMonth.at(-1)), 1)}% from first period`,
          positive: true
        },
        {
          label: "Cash Generation",
          value: `$${formatNum(m.cashGenerationBn.at(-1), 2)}B`,
          suffix: "",
          delta: `${formatNum(pctDelta(m.cashGenerationBn[0], m.cashGenerationBn.at(-1)), 1)}% from first period`,
          positive: true
        },
        {
          label: "Cost-to-Orbit Index",
          value: formatNum(m.costToOrbitIndex.at(-1), 0),
          suffix: " (lower is better)",
          delta: `${formatNum(pctDelta(m.costToOrbitIndex[0], m.costToOrbitIndex.at(-1)), 1)}% from first period`,
          positive: m.costToOrbitIndex.at(-1) < m.costToOrbitIndex[0]
        }
      ];

      kpiGrid.innerHTML = cards.map(c => `
        <div class="card kpi">
          <div class="label">${c.label}</div>
          <div class="value">${c.value}<span style="font-size:12px;font-weight:500;color:#9eb0d8">${c.suffix}</span></div>
          <div class="delta ${c.positive ? "positive" : "negative"}">${c.delta}</div>
        </div>
      `).join("");
    }

    function renderBars(name) {
      const d = companies[name];
      stageBars.innerHTML = stageMeta.map(s => {
        const val = d.stages[s.key].at(-1);
        return `
          <div class="bar-row">
            <div>${s.name}</div>
            <div class="track"><div class="fill" style="width:${val}%;background:${s.color}"></div></div>
            <div>${Math.round(val)}</div>
          </div>
        `;
      }).join("");
    }

    function renderDiagnosis(name) {
      const d = companies[name];
      const score = velocityScore(d);
      const diag = diagnosis(score);
      const color = diag.tone === "good" ? "var(--good)" : diag.tone === "warn" ? "var(--warn)" : "var(--bad)";
      diagnosisEl.innerHTML = `
        <div class="badge" style="background: ${color}22; color: ${color}; border:1px solid ${color}66;">${diag.label}</div>
        <div class="insight">${diag.text}</div>
        <div style="margin-top:12px;color:#9fb0d6;font-size:12px;">Current score: <b style="color:#e6edff">${formatNum(score, 0)}</b> / 100</div>
      `;
    }

    function renderLegend() {
      legendEl.innerHTML = stageMeta.map(s => `<span><span class="dot" style="background:${s.color}"></span>${s.name}</span>`).join("");
    }

    function drawTimeline(name) {
      const d = companies[name];
      const w = canvas.width;
      const h = canvas.height;
      const pad = { left: 52, right: 22, top: 24, bottom: 42 };
      const plotW = w - pad.left - pad.right;
      const plotH = h - pad.top - pad.bottom;

      ctx.clearRect(0, 0, w, h);

      ctx.strokeStyle = "#23345f";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 5; i++) {
        const y = pad.top + (plotH * i) / 5;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(w - pad.right, y);
        ctx.stroke();

        const val = 100 - i * 20;
        ctx.fillStyle = "#8ca1cc";
        ctx.font = "12px sans-serif";
        ctx.fillText(val, 20, y + 4);
      }

      const xStep = plotW / (d.periods.length - 1);
      d.periods.forEach((p, i) => {
        const x = pad.left + i * xStep;
        ctx.fillStyle = "#9bb0da";
        ctx.font = "12px sans-serif";
        const tw = ctx.measureText(p).width;
        ctx.fillText(p, x - tw / 2, h - 16);
      });

      stageMeta.forEach((s) => {
        const vals = d.stages[s.key];
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 2.3;
        ctx.beginPath();
        vals.forEach((v, i) => {
          const x = pad.left + i * xStep;
          const y = pad.top + ((100 - v) / 100) * plotH;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        vals.forEach((v, i) => {
          const x = pad.left + i * xStep;
          const y = pad.top + ((100 - v) / 100) * plotH;
          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fill();
        });
      });
    }

    function render(name) {
      renderKPIs(name);
      renderBars(name);
      renderDiagnosis(name);
      drawTimeline(name);
      renderLegend();
    }

    selectEl.addEventListener("change", () => render(selectEl.value));
    render(Object.keys(companies)[0]);
  </script>
</body>
</html>
