<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>X Cleaner</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px 16px 16px;
        font: 13px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #16181c;
        color: #e7e9ea;
      }
      h1 { font-size: 14px; margin: 0 0 10px; letter-spacing: 0.2px; }
      .row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 0; border-top: 1px solid #2f3336;
      }
      .row:first-of-type { border-top: none; }
      .row label { flex: 1; cursor: pointer; }
      .row input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }
      .stats {
        margin-top: 12px; padding-top: 10px; border-top: 1px solid #2f3336;
        font-size: 12px; color: #8b98a5;
      }
      .stats b { color: #e7e9ea; }
      .allow {
        margin-top: 10px; padding-top: 10px; border-top: 1px solid #2f3336;
      }
      .allow textarea {
        width: 100%; box-sizing: border-box; height: 60px;
        background: #1d1f23; color: #e7e9ea; border: 1px solid #2f3336;
        border-radius: 6px; padding: 6px; font: 12px monospace; resize: vertical;
      }
      .hint { font-size: 11px; color: #71767b; margin-top: 4px; }
      .save { margin-top: 8px; }
      .save button {
        background: #1d9bf0; color: white; border: none; padding: 6px 12px;
        border-radius: 999px; cursor: pointer; font-weight: 600;
      }
      .save button:hover { background: #1a8cd8; }
    </style>
  </head>
  <body>
    <h1>X Cleaner</h1>

    <div class="row">
      <label for="enabled">Enabled</label>
      <input id="enabled" type="checkbox" />
    </div>
    <div class="row">
      <label for="hideBlockedBy">Hide posts from users who blocked you</label>
      <input id="hideBlockedBy" type="checkbox" />
    </div>
    <div class="row">
      <label for="hideKnownAIHandles">Hide known AI bot accounts</label>
      <input id="hideKnownAIHandles" type="checkbox" />
    </div>
    <div class="row">
      <label for="hideAIReplies">Hide AI-style auto-replies</label>
      <input id="hideAIReplies" type="checkbox" />
    </div>

    <div class="allow">
      <label for="allowlist"><b>Allowlist</b> (one handle per line)</label>
      <textarea id="allowlist" placeholder="grok&#10;vitalikbuterin"></textarea>
      <div class="hint">These accounts are never hidden.</div>
      <div class="save"><button id="save" type="button">Save</button></div>
    </div>

    <div class="stats">
      Today: <b id="stat-total">0</b> hidden
      &nbsp;·&nbsp; blocked-by: <b id="stat-blocked">0</b>
      &nbsp;·&nbsp; AI: <b id="stat-ai">0</b>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
